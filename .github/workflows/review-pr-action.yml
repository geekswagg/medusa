name: Review PR (Reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
    secrets:
      MEDUSA_APP_ID:
        required: true
      MEDUSA_APP_PRIVATE_KEY:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_data=$(gh pr view ${{ inputs.pr_number }} --json title,author \
            --jq '{title: .title, author: .author.login}')
          {
            echo "title<<EOF"
            echo "$pr_data" | jq -r '.title'
            echo "EOF"
            echo "author=$(echo "$pr_data" | jq -r '.author')"
          } >> $GITHUB_OUTPUT

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MEDUSA_APP_ID }}
          private-key: ${{ secrets.MEDUSA_APP_PRIVATE_KEY }}

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: develop
          show_full_output: true
          plugin_marketplaces: "https://github.com/medusajs/medusa-agent-skills.git"
          plugins: "medusa-dev@medusa"

          prompt: |
            PR NUMBER: ${{ inputs.pr_number }}
            PR TITLE: ${{ steps.pr-info.outputs.title }}
            PR AUTHOR: ${{ steps.pr-info.outputs.author }}

            Note: all scripts are located in the root `scripts/` directory and should be run as `bash scripts/<script>.sh`.

            /reviewing-prs ${{ inputs.pr_number }} "${{ steps.pr-info.outputs.title }}" "${{ steps.pr-info.outputs.author }}"

          claude_args: >-
            --allowedTools
            "Bash(bash scripts/get_pr.sh:*),
            Bash(bash scripts/get_pr_files.sh:*),
            Bash(bash scripts/get_linked_issues.sh:*),
            Bash(bash scripts/get_comments.sh:*),
            Bash(bash scripts/add_comment.sh:*),
            Bash(bash scripts/labels.sh:*),
            Bash(bash scripts/get_labels.sh:*),
            Bash(bash scripts/get_issue.sh:*),
            Bash(bash scripts/close_issue.sh:*),
            Read"
